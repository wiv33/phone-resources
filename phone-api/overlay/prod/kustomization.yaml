namespace: phoneshin
commonLabels:
  app: phoneshin-api
  env: prod
resources:
  - ../../base
patches:
  - path: deploy.yaml
    target:
      kind: Deployment
      name: phoneshin-api-deploy
  - path: service.yaml
    target:
      kind: Service
      name: phoneshin-api-svc
  - path: vs.yaml
    target:
      kind: VirtualService
      name: phoneshin-api-vs
images:
  - name: 'registry-harbor.phoneshin.com/phoneshin/api'
    newName: 'registry-harbor.phoneshin.com/phoneshin/api'
    newTag: 804ee3fb11a236ec14dba73e87e2343e5fb03f6e
