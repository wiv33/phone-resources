# Phase 7.5 — phone-api 가 namespace 내 CronJob/Job 조작용 ServiceAccount + RBAC.
#
# 사용처:
#  - SyncTriggerService — POST /v1/admin/calculator/sync/trigger
#  - phone-crawl 의 CronJob 에서 jobTemplate 을 추출해 일회성 Job 생성
#
# 권한 범위:
#  - cronjobs: get/list (jobTemplate 추출)
#  - jobs: get/list/create/watch (manual run 생성 + 진행 추적)
#  - 기타 (pods, secrets 등) 모두 미부여 — 최소 권한 원칙
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: phoneshin-api-sa
  namespace: phoneshin
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: phoneshin-api-job-trigger
  namespace: phoneshin
rules:
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["get", "list"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "create", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: phoneshin-api-job-trigger
  namespace: phoneshin
subjects:
  - kind: ServiceAccount
    name: phoneshin-api-sa
    namespace: phoneshin
roleRef:
  kind: Role
  name: phoneshin-api-job-trigger
  apiGroup: rbac.authorization.k8s.io
