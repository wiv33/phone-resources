apiVersion: batch/v1
kind: CronJob
metadata:
  name: phoneshin-crawl-subsidy
  labels:
    app: phoneshin-crawl
    target: subsidy
spec:
  # 매주 월/목 04:00 KST — Firecrawl credits 절감을 위해 주 2회로 조정 (Phase 8 결정)
  # 사용자 메모: "나중에 필요 시 비용을 늘릴 거야"
  # K8s 1.24+ timeZone 필드 지원
  schedule: "0 4 * * 1,4"
  timeZone: "Asia/Seoul"
  concurrencyPolicy: Forbid           # 이전 실행 진행 중이면 신규 스킵
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  startingDeadlineSeconds: 3600       # 노드 다운 등으로 1시간 이상 지연 시 skip
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 14400    # 4시간 — rate limit 1req/5sec * 1500items 상한
      ttlSecondsAfterFinished: 604800 # 7일 후 자동 정리
      template:
        metadata:
          labels:
            app: phoneshin-crawl
            target: subsidy
          annotations:
            # 이 Job 은 단명 batch 작업 — outbound HTTP(Firecrawl/phone-api) 만 호출하고
            # cluster-internal 통신은 plaintext(`http://phoneshin-api-svc...`) 라 mTLS 불필요.
            # Sidecar 미주입으로 Pod 가 NotReady 1/2 로 잔존하는 근본 문제 제거.
            sidecar.istio.io/inject: "false"
            # 미래에 누가 sidecar 를 다시 켜도 envoy 가 idle 후 자동 종료되도록 fallback 유지.
            proxy.istio.io/config: |
              proxyMetadata:
                EXIT_ON_ZERO_ACTIVE_CONNECTIONS: "true"
        spec:
          restartPolicy: OnFailure
          nodeSelector:
            kubernetes.io/hostname: backbone-worker
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule
          imagePullSecrets:
            - name: inner-harbor-registry
          containers:
            - name: phoneshin-crawl
              image: 'registry-harbor.phoneshin.com/phoneshin/crawl:latest'
              imagePullPolicy: Always
              resources:
                requests:
                  cpu: "300m"
                  memory: "512Mi"
                limits:
                  cpu: "1000m"
                  memory: "2Gi"
              env:
                - name: TZ
                  value: Asia/Seoul
                - name: DEPLOY_ENV
                  value: prod
                # Phase 7.5: 어떤 작업을 실행할지 분기.
                # 옵션: subsidy | card | wireline (현재는 subsidy 만 구현, 나머지는 Phase 8/9)
                - name: CRAWL_TARGET
                  value: subsidy
                - name: PHONE_API_INGEST_ENDPOINT
                  value: 'http://phoneshin-api-svc.phoneshin.svc.cluster.local:8080/v1/internal/ingest/subsidy'
                - name: PHONE_API_AUTH_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: phoneshin-crawl-secret
                      key: phone-api-auth-token
                - name: FIRECRAWL_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: phoneshin-crawl-secret
                      key: firecrawl-api-key
                - name: SLACK_WEBHOOK_URL
                  valueFrom:
                    secretKeyRef:
                      name: phoneshin-crawl-secret
                      key: slack-webhook-url
                      optional: true
