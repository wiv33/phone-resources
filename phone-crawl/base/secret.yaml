apiVersion: v1
kind: Secret
metadata:
  name: phoneshin-crawl-secret
  labels:
    app: phoneshin-crawl
type: Opaque
stringData:
  # phone-api 의 SUPER_ADMIN JWT.
  # 보안 권고:
  #  - 추후 K8s ServiceAccount 토큰 → Keycloak service-account 매핑으로 교체
  #  - 임시 운영: kubectl edit secret 또는 ExternalSecrets Operator 로 외부 vault 에서 주입
  phone-api-auth-token: "REPLACE_WITH_SUPER_ADMIN_JWT"
  # Firecrawl API key (https://firecrawl.dev). Free tier 500 credits/월.
  # ArgoCD selfHeal=true 로 placeholder 로 reset 됨 — 운영 적용은 kubectl 으로 별도 patch:
  #   kubectl create secret generic phoneshin-crawl-secret \
  #     --from-literal=firecrawl-api-key="<실 key>" --dry-run=client -o yaml | kubectl apply -f -
  firecrawl-api-key: "REPLACE_WITH_FIRECRAWL_API_KEY"
  # Slack webhook URL (FAILED 시 알림). 미설정 시 로그만.
  slack-webhook-url: ""
