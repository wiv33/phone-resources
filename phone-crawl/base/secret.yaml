apiVersion: v1
kind: Secret
metadata:
  name: phoneshin-crawl-secret
  labels:
    app: phoneshin-crawl
type: Opaque
stringData:
  # phone-api 의 SUPER_ADMIN JWT.
  # 보안 권고:
  #  - 추후 K8s ServiceAccount 토큰 → Keycloak service-account 매핑으로 교체
  #  - 임시 운영: kubectl edit secret 또는 ExternalSecrets Operator 로 외부 vault 에서 주입
  phone-api-auth-token: "REPLACE_WITH_SUPER_ADMIN_JWT"
