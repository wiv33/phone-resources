# Phase 11 — 요금제 카탈로그 자동 ingest CronJob
# 매월 1일 05:00 KST — 요금제는 자주 바뀌지 않으므로 월 1회로 충분 + Firecrawl 절감.
# subsidy/card/wireline 와 동일 image / secret / 노드, target 만 분기.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: phoneshin-crawl-plan
  labels:
    app: phoneshin-crawl
    target: plan
spec:
  schedule: "0 5 1 * *"
  timeZone: "Asia/Seoul"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  startingDeadlineSeconds: 3600
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 7200       # 2시간 — 3 carrier plan page LLM 추출
      ttlSecondsAfterFinished: 604800
      template:
        metadata:
          labels:
            app: phoneshin-crawl
            target: plan
          annotations:
            sidecar.istio.io/inject: "false"
            proxy.istio.io/config: |
              proxyMetadata:
                EXIT_ON_ZERO_ACTIVE_CONNECTIONS: "true"
        spec:
          restartPolicy: OnFailure
          nodeSelector:
            kubernetes.io/hostname: backbone-worker
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule
          imagePullSecrets:
            - name: inner-harbor-registry
          containers:
            - name: phoneshin-crawl
              image: 'registry-harbor.phoneshin.com/phoneshin/crawl:latest'
              imagePullPolicy: Always
              resources:
                requests:
                  cpu: "300m"
                  memory: "512Mi"
                limits:
                  cpu: "1000m"
                  memory: "2Gi"
              env:
                - name: TZ
                  value: Asia/Seoul
                - name: DEPLOY_ENV
                  value: prod
                - name: CRAWL_TARGET
                  value: plan
                - name: PHONE_API_INGEST_ENDPOINT
                  value: 'http://phoneshin-api-svc.phoneshin.svc.cluster.local:8080/v1/internal/ingest/subsidy'
                - name: PHONE_API_INGEST_PLAN_ENDPOINT
                  value: 'http://phoneshin-api-svc.phoneshin.svc.cluster.local:8080/v1/internal/ingest/plan'
                - name: PHONE_API_AUTH_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: phoneshin-crawl-secret
                      key: phone-api-auth-token
                # Self-hosted Firecrawl — phone-resources/firecrawl 에서 배포.
                - name: FIRECRAWL_BASE_URL
                  value: 'http://firecrawl-api.firecrawl.svc.cluster.local:3002'
                - name: FIRECRAWL_API_KEY
                  value: 'self-hosted-no-auth'
                - name: SLACK_WEBHOOK_URL
                  valueFrom:
                    secretKeyRef:
                      name: phoneshin-crawl-secret
                      key: slack-webhook-url
                      optional: true
