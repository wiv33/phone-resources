# Phase 13 (2026-05-04) — SmartChoice 보조금 크롤러
# Phase 1 유선 확장 (2026-05-12): 동일 Job 에서 무선 Phase A → 유선 Phase B 순차 실행.
#
# 매일 03:00 KST (= UTC 18:00) 실행.
# SmartChoice (smartchoice.or.kr) 에서 3사 × 단말기 × 7요금제 보조금 매트릭스 (무선) 와
# 3사 × 결합옵션 × 약정 × 속도 × WiFi 72조합 (유선) 을 모두 수집하여
# phone-api 의 /v1/internal/ingest/subsidy + /v1/internal/ingest/wired-plan 으로 각각 ingest.
#
# 시크릿: kubectl create secret generic phoneshin-crawl-secret \
#   --from-literal=phone-api-auth-token=<INTERNAL_TOKEN> -n phoneshin
#
# CLI 모드 (web-application-type: none) — Spring Boot 가 ApplicationRunner 종료 후 자동 exit.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: phoneshin-crawl-subsidy
spec:
  # 매일 18:00 UTC = KST 03:00 (Phase 1 유선 확장 후 매일로 변경 — 2026-05-12)
  schedule: "0 18 * * *"
  timeZone: "UTC"
  concurrencyPolicy: Forbid                # 이전 실행이 진행 중이면 skip
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 3600          # 1시간 hard cap
      template:
        spec:
          restartPolicy: OnFailure
          # harbor private registry 인증 — phoneshin-api Pod 와 동일 secret 사용.
          # 누락 시 ImagePullBackOff (registry-harbor.phoneshin.com 접근 거부).
          imagePullSecrets:
            - name: inner-harbor-registry
          containers:
            - name: phoneshin-crawl
              image: registry-harbor.phoneshin.com/phoneshin/crawl:latest
              imagePullPolicy: IfNotPresent
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 768Mi
              env:
                - name: TZ
                  value: Asia/Seoul
                - name: SPRING_PROFILES_ACTIVE
                  value: prod
                - name: SMARTCHOICE_BASE_URL
                  value: https://www.smartchoice.or.kr
                - name: PHONE_API_INGEST_ENDPOINT
                  # svc 명: phoneshin-api-svc (phone-api 아님 — NXDOMAIN 회귀 차단)
                  value: http://phoneshin-api-svc.phoneshin.svc.cluster.local:8080/v1/internal/ingest/subsidy
                - name: PHONE_API_WIRED_INGEST_ENDPOINT
                  # 유선 phase B (2026-05-12 phase 1 추가)
                  value: http://phoneshin-api-svc.phoneshin.svc.cluster.local:8080/v1/internal/ingest/wired-plan
                - name: PHONE_API_AUTH_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: phoneshin-crawl-secret
                      key: phone-api-auth-token
                - name: SLACK_WEBHOOK_URL
                  valueFrom:
                    secretKeyRef:
                      name: phoneshin-crawl-secret
                      key: slack-webhook-url
                      optional: true
