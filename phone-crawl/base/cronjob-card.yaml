# Phase 8 — 제휴카드 자동 ingest CronJob
# 매월 1·11·21일 04:30 KST — 사용자 요구 "월초 1~3회"
# subsidy CronJob 과 image / secret / 노드 동일, target 만 분기.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: phoneshin-crawl-card
  labels:
    app: phoneshin-crawl
    target: card
spec:
  schedule: "30 4 1,11,21 * *"
  timeZone: "Asia/Seoul"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  startingDeadlineSeconds: 3600
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 7200       # 2시간 — 카드 페이지 수가 단말보다 적음
      ttlSecondsAfterFinished: 604800
      template:
        metadata:
          labels:
            app: phoneshin-crawl
            target: card
        spec:
          restartPolicy: OnFailure
          nodeSelector:
            kubernetes.io/hostname: backbone-worker
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule
          imagePullSecrets:
            - name: inner-harbor-registry
          containers:
            - name: phoneshin-crawl
              image: 'registry-harbor.phoneshin.com/phoneshin/crawl:latest'
              imagePullPolicy: Always
              resources:
                requests:
                  cpu: "300m"
                  memory: "512Mi"
                limits:
                  cpu: "1000m"
                  memory: "2Gi"
              env:
                - name: TZ
                  value: Asia/Seoul
                - name: DEPLOY_ENV
                  value: prod
                - name: CRAWL_TARGET
                  value: card
                - name: PHONE_API_INGEST_ENDPOINT
                  value: 'http://phoneshin-api-svc.phoneshin.svc.cluster.local:8080/v1/internal/ingest/card'
                - name: PHONE_API_AUTH_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: phoneshin-crawl-secret
                      key: phone-api-auth-token
                - name: FIRECRAWL_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: phoneshin-crawl-secret
                      key: firecrawl-api-key
                - name: SLACK_WEBHOOK_URL
                  valueFrom:
                    secretKeyRef:
                      name: phoneshin-crawl-secret
                      key: slack-webhook-url
                      optional: true
