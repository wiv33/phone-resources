# Self-hosted Firecrawl 의 큐/캐시 backend.
# emptyDir 사용 — 큐는 휘발성이라 PV 불필요 (장기 보존 데이터 없음, scrape 재시도는 phone-crawl 가 담당).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: firecrawl-redis
  labels:
    app: firecrawl
    component: redis
spec:
  replicas: 1
  strategy:
    type: Recreate                       # emptyDir + 단일 인스턴스 — RollingUpdate 시 스플릿 방지
  selector:
    matchLabels:
      app: firecrawl
      component: redis
  template:
    metadata:
      labels:
        app: firecrawl
        component: redis
      annotations:
        # phone-crawl Job 이 sidecar 미주입 상태로 호출 — Firecrawl 도 동일하게 plaintext 트래픽으로 통일.
        sidecar.istio.io/inject: "false"
    spec:
      nodeSelector:
        kubernetes.io/hostname: backbone-worker
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "--bind", "0.0.0.0", "--save", "", "--appendonly", "no"]
          ports:
            - name: redis
              containerPort: 6379
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: firecrawl-redis
  labels:
    app: firecrawl
    component: redis
spec:
  selector:
    app: firecrawl
    component: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
  type: ClusterIP
