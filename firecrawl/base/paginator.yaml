# Phase 11+ — Playwright paginator 사이드카.
# self-hosted Firecrawl 가 actions 미지원이라 SPA 페이지네이션 (T-world goPage(N) 등)
# 처리를 위해 별도 Node.js + Playwright 마이크로서비스 운영.
#
# 이미지: harbor 내부 빌드 (registry-harbor.phoneshin.com/phoneshin/playwright-paginator).
# Dockerfile: phone-resources/firecrawl/paginator/Dockerfile.
# CI 또는 수동 빌드: ./build.sh 후 push.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: firecrawl-paginator
  labels:
    app: firecrawl
    component: paginator
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: firecrawl
      component: paginator
  template:
    metadata:
      labels:
        app: firecrawl
        component: paginator
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      nodeSelector:
        kubernetes.io/hostname: backbone-worker
      imagePullSecrets:
        - name: inner-harbor-registry
      containers:
        - name: paginator
          image: registry-harbor.phoneshin.com/phoneshin/playwright-paginator:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: DEFAULT_TIMEOUT_MS
              value: "90000"
          resources:
            requests:
              cpu: "300m"
              memory: "512Mi"
            limits:
              cpu: "1500m"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: firecrawl-paginator
  labels:
    app: firecrawl
    component: paginator
spec:
  selector:
    app: firecrawl
    component: paginator
  ports:
    - name: http
      port: 3001
      targetPort: 3001
  type: ClusterIP
