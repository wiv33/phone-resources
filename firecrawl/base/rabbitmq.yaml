# Firecrawl v2 의 NUQ (Native Queue) messaging backend.
# emptyDir — queue 데이터는 휘발성, 재시작 시 phone-crawl 가 다시 호출.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: firecrawl-rabbitmq
  labels:
    app: firecrawl
    component: rabbitmq
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: firecrawl
      component: rabbitmq
  template:
    metadata:
      labels:
        app: firecrawl
        component: rabbitmq
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      nodeSelector:
        kubernetes.io/hostname: backbone-worker
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management
          ports:
            - name: amqp
              containerPort: 5672
            - name: management
              containerPort: 15672
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "ping"]
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "check_running"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: firecrawl-rabbitmq
  labels:
    app: firecrawl
    component: rabbitmq
spec:
  selector:
    app: firecrawl
    component: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
  type: ClusterIP
