# Firecrawl 큐 워커 — Redis 에서 작업을 pop 해서 Playwright 호출 + LLM 추출 처리.
# api 와 동일 image, command 만 다름.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: firecrawl-worker
  labels:
    app: firecrawl
    component: worker
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: firecrawl
      component: worker
  template:
    metadata:
      labels:
        app: firecrawl
        component: worker
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      nodeSelector:
        kubernetes.io/hostname: backbone-worker
      containers:
        - name: worker
          image: ghcr.io/mendableai/firecrawl:latest
          imagePullPolicy: IfNotPresent
          command: ["pnpm", "run", "workers"]
          env:
            - name: PORT
              value: "3002"
            - name: HOST
              value: "0.0.0.0"
            - name: REDIS_URL
              value: "redis://firecrawl-redis:6379"
            - name: REDIS_RATE_LIMIT_URL
              value: "redis://firecrawl-redis:6379"
            - name: PLAYWRIGHT_MICROSERVICE_URL
              value: "http://firecrawl-playwright:3000/scrape"
            - name: USE_DB_AUTHENTICATION
              value: "false"
            - name: NUM_WORKERS_PER_QUEUE
              value: "4"
            - name: MODEL_NAME
              value: "gpt-4o-mini"
            - name: MODEL_EMBEDDING_NAME
              value: "text-embedding-3-small"
            - name: OPENAI_BASE_URL
              value: "https://api.openai.com/v1"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: phoneshin-firecrawl-secret
                  key: openai-api-key
            - name: BULL_AUTH_KEY
              value: "disabled"
          resources:
            requests:
              cpu: "300m"
              memory: "512Mi"
            limits:
              cpu: "1500m"
              memory: "1.5Gi"
