# Firecrawl 의 HTTP API + worker harness (v2 통합).
# - USE_DB_AUTHENTICATION=false: cluster 내부 호출만이라 DB 기반 API key 검증 비활성.
# - LLM: Hugging Face Inference Providers (OpenAI-compatible router). 무료 tier — 비용 0.
#   * BASE_URL=https://router.huggingface.co/v1
#   * MODEL=meta-llama/Llama-3.3-70B-Instruct
# - OPENAI_API_KEY: phoneshin-firecrawl-secret 의 openai-api-key — HF token 주입.
# - 의존성: redis (Bull queue) + rabbitmq (NUQ messaging) + nuq-postgres (NUQ persistence)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: firecrawl-api
  labels:
    app: firecrawl
    component: api
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: firecrawl
      component: api
  template:
    metadata:
      labels:
        app: firecrawl
        component: api
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      nodeSelector:
        kubernetes.io/hostname: backbone-worker
      containers:
        - name: api
          image: ghcr.io/firecrawl/firecrawl:latest
          imagePullPolicy: IfNotPresent
          # v2 harness — single command 가 api + worker + extract-worker 모두 관리.
          command: ["node", "dist/src/harness.js", "--start-docker"]
          ports:
            - name: http
              containerPort: 3002
            - name: extract
              containerPort: 3004
            - name: worker
              containerPort: 3005
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "3002"
            - name: INTERNAL_PORT
              value: "3002"
            - name: EXTRACT_WORKER_PORT
              value: "3004"
            - name: WORKER_PORT
              value: "3005"
            - name: ENV
              value: "local"
            - name: REDIS_URL
              value: "redis://firecrawl-redis:6379"
            - name: REDIS_RATE_LIMIT_URL
              value: "redis://firecrawl-redis:6379"
            - name: NUQ_RABBITMQ_URL
              value: "amqp://firecrawl-rabbitmq:5672"
            - name: POSTGRES_HOST
              value: "firecrawl-postgres"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              value: "postgres"
            - name: POSTGRES_DB
              value: "postgres"
            - name: PLAYWRIGHT_MICROSERVICE_URL
              value: "http://firecrawl-playwright:3000/scrape"
            - name: USE_DB_AUTHENTICATION
              value: "false"
            - name: NUM_WORKERS_PER_QUEUE
              value: "4"
            - name: CRAWL_CONCURRENT_REQUESTS
              value: "5"
            - name: MAX_CONCURRENT_JOBS
              value: "3"
            - name: BROWSER_POOL_SIZE
              value: "3"
            # LLM 설정 — Hugging Face Inference Providers (OpenAI-compatible).
            - name: MODEL_NAME
              value: "meta-llama/Llama-3.3-70B-Instruct"
            - name: MODEL_EMBEDDING_NAME
              value: "sentence-transformers/all-MiniLM-L6-v2"
            - name: OPENAI_BASE_URL
              value: "https://router.huggingface.co/v1"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: phoneshin-firecrawl-secret
                  key: openai-api-key
            - name: BULL_AUTH_KEY
              value: "disabled"
            - name: HARNESS_STARTUP_TIMEOUT_MS
              value: "120000"
            - name: LOGGING_LEVEL
              value: "info"
          resources:
            requests:
              cpu: "300m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /
              port: 3002
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: 3002
            initialDelaySeconds: 90
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: firecrawl-api
  labels:
    app: firecrawl
    component: api
spec:
  selector:
    app: firecrawl
    component: api
  ports:
    - name: http
      port: 3002
      targetPort: 3002
  type: ClusterIP
