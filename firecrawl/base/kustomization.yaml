apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
commonLabels:
  app: firecrawl
resources:
  - redis.yaml         # Bull queue + rate limit
  - rabbitmq.yaml      # NUQ messaging (v2)
  - postgres.yaml      # NUQ persistence (v2)
  - playwright.yaml    # headless browser 렌더링 (Firecrawl 의존)
  - api.yaml           # api + worker harness 통합 (v2)
  - paginator.yaml     # SPA 페이지네이션 사이드카 (Phase 11+)
# secret 은 ArgoCD 관리 X — public repo 라 placeholder 만 두는 위험 회피.
# 운영 적용은 kubectl create secret 으로 별도 관리:
#   kubectl create secret generic phoneshin-firecrawl-secret \
#     --from-literal=openai-api-key=<HF_TOKEN_OR_OPENAI_KEY> \
#     -n phoneshin --dry-run=client -o yaml | kubectl apply -f -
#
# Service 엔드포인트 (cluster 내부 — 별도 firecrawl namespace):
#   http://firecrawl-api.firecrawl.svc.cluster.local:3002
# phone-crawl CronJob 의 FIRECRAWL_BASE_URL 환경변수에 위 URL 주입.
# secret 도 firecrawl namespace 에 생성 필요 (-n firecrawl).
