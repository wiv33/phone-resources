# Firecrawl 의 headless browser 렌더링 마이크로서비스.
# - Chromium 1 인스턴스 메모리 ≈500MB, 동시 렌더 시 +200MB/탭 → limit 1.5Gi.
# - BLOCK_MEDIA=true: 통신사 사이트의 광고 이미지/비디오 차단 → 메모리/시간 절약.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: firecrawl-playwright
  labels:
    app: firecrawl
    component: playwright
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: firecrawl
      component: playwright
  template:
    metadata:
      labels:
        app: firecrawl
        component: playwright
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      nodeSelector:
        kubernetes.io/hostname: backbone-worker
      containers:
        - name: playwright
          image: ghcr.io/mendableai/playwright-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: BLOCK_MEDIA
              value: "true"
          resources:
            requests:
              cpu: "300m"
              memory: "512Mi"
            limits:
              cpu: "1500m"
              memory: "1536Mi"
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/liveness
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: firecrawl-playwright
  labels:
    app: firecrawl
    component: playwright
spec:
  selector:
    app: firecrawl
    component: playwright
  ports:
    - name: http
      port: 3000
      targetPort: 3000
  type: ClusterIP
