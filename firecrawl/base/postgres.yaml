# Firecrawl v2 의 NUQ persistence — nuq-postgres custom image (확장 미리 설치).
# emptyDir — phone-crawl 의 외부 ingest endpoint 가 진실 source 라 PV 불필요.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: firecrawl-postgres
  labels:
    app: firecrawl
    component: postgres
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: firecrawl
      component: postgres
  template:
    metadata:
      labels:
        app: firecrawl
        component: postgres
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      nodeSelector:
        kubernetes.io/hostname: backbone-worker
      containers:
        - name: postgres
          image: ghcr.io/firecrawl/nuq-postgres:latest
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              value: "postgres"
            - name: POSTGRES_DB
              value: "postgres"
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: firecrawl-postgres
  labels:
    app: firecrawl
    component: postgres
spec:
  selector:
    app: firecrawl
    component: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
  type: ClusterIP
